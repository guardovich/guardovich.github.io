<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Radio Guardovich</title>
<link rel="stylesheet" href="style.css">
<script src="app.js" defer></script>
</head>

<body>

<div class="player">

  <div class="title">🎧 RADIO GUARDOVICH</div>

  <!-- AVATAR -->
  <div class="avatar">
    <img src="assets/sinei.png" alt="Sinei Chuini">
  </div>

  <div class="entity">
    >> SINEI CHUINI ONLINE
  </div>

  <!-- PANTALLA -->
  <div class="screen" id="status">
    >> READY
  </div>

  <!-- CONTROLES -->
  <div class="controls">
    <button onclick="play()">PLAY</button>
    <button onclick="stop()">STOP</button>
  </div>

  <!-- NOTICIAS -->
  <div class="news" id="news">
    >> CARGANDO NOTICIAS...
  </div>

</div>

<audio id="audio"></audio>

</body>
</html>
