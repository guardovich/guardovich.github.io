<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Guardovich CPC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- PANEL IZQUIERDO -->
  <aside class="sidebar">

    <!-- RELOJ -->
    <div class="clock" id="clock">
      00:00:00<br>
      01/01/1985
    </div>

    <!-- LOGO -->
    <img src="img/monitor.png" alt="Amstrad CPC" class="logo-img">

    <!-- MARCA -->
    <div class="brand">
      <h1>AMSTRAD CPC</h1>
      <h2>GUARDOVICH TECHNOLOGIES</h2>
    </div>

    <!-- ESTADO -->
    <div class="system-info">
      <p>STATUS: ONLINE</p>
      <p id="modeLabel">MODE: 1</p>
      <p>DATA: READY</p>
    </div>
  </aside>

  <!-- TERMINAL -->
  <main class="main">
    <div class="screen mode1" id="screen">

      <!-- BOOT -->
      <div id="boot"></div>

      <!-- TERMINAL -->
      <div id="terminal" style="display:none;">
        <div id="output"></div>

        <div class="input-line">
          <span class="prompt">></span>
          <input id="commandInput" autocomplete="off" spellcheck="false" />
          <span class="cursor"></span>
        </div>
      </div>

    </div>
  </main>

</div>

<script src="script.js"></script>
</body>
</html>
