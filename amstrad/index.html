<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Guardovich CPC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="clock" id="clock">
      00:00:00<br>
      01/01/1985
    </div>

    <img src="img/monitor.png" alt="Amstrad CPC" class="logo-img">

    <div class="brand">
      <h1>AMSTRAD CPC</h1>
      <h2>GUARDOVICH TECHNOLOGIES</h2>
    </div>

    <div class="system-info">
      <p>STATUS: ONLINE</p>
      <p id="modeLabel">MODE: 1</p>
      <p>DATA: READY</p>
    </div>
  </aside>

  <main class="main">
    <div class="monitor-wrapper">
      <img src="img/amstradlogo.png" class="cpc-logo-top" alt="Amstrad Logo">

      <div class="screen mode1" id="screen">
        <div id="boot"></div>

        <div id="terminal" style="display:none;">
          <div id="output"></div>

          <div id="editorStatus" class="editor-status" style="display:none;">
            WORDSTAR MODE · ESC EXIT · SAVE · LOAD
          </div>

          <div class="input-line">
            <span class="prompt" id="prompt">&gt;</span>
            <input id="commandInput" autocomplete="off" spellcheck="false" />
            <span class="cursor"></span>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<input type="file" id="fileInput" accept=".md,.txt" style="display:none;">

<script src="script.js"></script>
</body>
</html>
