<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Amstrad CPC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGO -->
<div class="logo">
  <img src="img/monitor.png" alt="Amstrad CPC">
</div>

<!-- TERMINAL -->
<div class="terminal-container">
  <div class="screen">

    <div id="output">
      <p>Amstrad Consumer Electronics plc</p>
      <p>BASIC 1.0</p>
      <p>Ready</p>
    </div>

    <div class="input-line">
      <span class="prompt">></span>
      <input id="commandInput" autofocus />
      <span class="cursor"></span>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
