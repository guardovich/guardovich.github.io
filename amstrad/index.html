<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Guardovich CPC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- PANEL IZQUIERDO -->
  <aside class="sidebar">
    <img src="img/monitor.png" alt="Amstrad CPC" class="logo-img">

    <div class="brand">
      <h1>AMSTRAD CPC</h1>
      <h2>GUARDOVICH TECHNOLOGIES</h2>
    </div>
  </aside>

  <!-- TERMINAL -->
  <main class="main">

    <div class="screen">

      <!-- BOOT -->
      <div id="boot"></div>

      <!-- TERMINAL -->
      <div id="terminal" style="display:none;">
        <div id="output"></div>

        <div class="input-line">
          <span class="prompt">></span>
          <input id="commandInput" autocomplete="off" />
          <span class="cursor"></span>
        </div>
      </div>

    </div>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
