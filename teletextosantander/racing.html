<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>


<script>

/* reloj */

function updateClock(){

const now=new Date()

document.getElementById("clock-box").textContent=
now.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})

document.getElementById("date-box").textContent=
now.toLocaleDateString("es-ES",{
weekday:"short",
day:"2-digit",
month:"short",
year:"numeric"
}).toUpperCase()

}


/* utilidades */

function formatTime(value){

if(!value) return "--:--"

return new Date(value).toLocaleTimeString("es-ES",{
hour:"2-digit",
minute:"2-digit"
})

}

function escapeHtml(str=""){

return String(str)
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;")
.replaceAll('"',"&quot;")
.replaceAll("'","&#039;")

}


/* cargar noticias del racing */

async function loadRacing(){

await ensureSession()

const {data,error}=await supabaseClient
.from("posts")
.select("id,title,body,zone,created_at")
.eq("kind","news")
.eq("zone","Racing")
.eq("approved",true)
.order("created_at",{ascending:false})
.limit(20)

const container=document.getElementById("racing-news")

if(error){

console.log(error)

container.innerHTML=`
<div class="empty-box">
ERROR CARGANDO ACTUALIDAD DEL RACING
</div>
`

return

}

if(!data || !data.length){

container.innerHTML=`
<div class="empty-box">
NO HAY NOTICIAS DEL RACING DISPONIBLES
</div>
`

return

}


container.innerHTML=data.map(item=>`

<article class="news-item racing-news-item">

<div class="racing-news-headline">

<img
src="/teletextosantander/img/racingescudo.png"
class="racing-news-icon"
alt="Racing">

<div class="racing-news-text">

<div class="news-head">

<h3 class="news-title">
${escapeHtml(item.title)}
</h3>

<div class="news-time">
RACING · ${formatTime(item.created_at)}
</div>

</div>

<p class="news-body">
${escapeHtml(item.body)}
</p>

</div>

</div>

</article>

`).join("")

}


/* iniciar */

updateClock()
setInterval(updateClock,1000)

loadRacing()

</script>
