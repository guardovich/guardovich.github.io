<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Avisos · Teletexto Santander</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="tv-shell">
  <div class="tv-brand-badge">
    <div class="tv-pixel-logo"></div>
    <div class="tv-brand-text">TV<br>SANTANDER</div>
  </div>

  <div class="tv-bezel">
    <div class="tv-inner-shadow">
      <div class="tv-screen-curved">
        <div class="tv-static"></div>
        <div class="tv-screen-overlay"></div>
        <div class="tv-screen-glow"></div>

        <div class="ttx-page">
          <header class="ttx-header">
            <div class="ttx-topline">
              <div class="ttx-pagecode">
                <span class="c-green">P106</span>
                <span class="ttx-sep">|</span>
                <span id="clock-box">00:00</span>
              </div>
              <div class="ttx-datebox">
                <span id="date-box">AVISOS</span>
              </div>
            </div>

            <div class="ttx-head-main">
              <div class="ttx-brand-wrap">
                <div class="ttx-brand">
                  <span class="c-cyan">AVISOS</span><span class="c-yellow">CIUDADANOS</span>
                </div>
                <div class="ttx-subline">
                  <span class="c-green">INCIDENCIAS · ANUNCIOS · SERVICIO PÚBLICO</span>
                </div>
              </div>
            </div>
          </header>

          <main class="ttx-main" style="border-right:none;">
            <div class="section-title c-black-on-cyan">TABLÓN 106</div>
            <div class="tele-separator">████████████████████████████████████████████████████████</div>

            <div id="avisos-list" class="news-list">
              <div class="empty-box">CARGANDO AVISOS...</div>
            </div>
          </main>

          <footer class="ttx-footer tele-footer">
            <a class="footer-link" href="./index.html"><span class="c-cyan">100</span> PORTADA</a>
            <a class="footer-link" href="./publicar.html"><span class="c-yellow">101</span> PUBLICAR</a>
            <a class="footer-link" href="./archivo.html"><span class="c-magenta">102</span> ARCHIVO</a>
            <a class="footer-link" href="./tiempo.html"><span class="c-green">103</span> TIEMPO</a>
            <a class="footer-link" href="./racing.html"><span class="c-red">104</span> RACING</a>
            <a class="footer-link" href="./avisos.html"><span class="c-blue">106</span> AVISOS</a>
            <span class="footer-cursor">█</span>
          </footer>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
function formatTime(value) {
  if (!value) return "--:--";
  return new Date(value).toLocaleTimeString("es-ES", {
    hour: "2-digit",
    minute: "2-digit"
  });
}

function escapeHtml(str = "") {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function updateClock() {
  const now = new Date();
  const clock = document.getElementById("clock-box");
  const date = document.getElementById("date-box");

  if (clock) {
    clock.textContent = now.toLocaleTimeString("es-ES", {
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  if (date) {
    date.textContent = now.toLocaleDateString("es-ES", {
      weekday: "short",
      day: "2-digit",
      month: "short",
      year: "numeric"
    }).toUpperCase();
  }
}

async function loadAvisos() {
  await ensureSession();

  const { data, error } = await supabaseClient
    .from("posts")
    .select("id, title, body, zone, created_at")
    .eq("kind", "news")
    .eq("zone", "Avisos")
    .eq("approved", true)
    .order("created_at", { ascending: false })
    .limit(20);

  const container = document.getElementById("avisos-list");

  if (error) {
    console.error("Error cargando avisos:", error);
    container.innerHTML = `<div class="empty-box">ERROR CARGANDO AVISOS</div>`;
    return;
  }

  if (!data || !data.length) {
    container.innerHTML = `<div class="empty-box">NO HAY AVISOS DISPONIBLES</div>`;
    return;
  }

  container.innerHTML = data.map(item => `
    <article class="news-item">
      <div class="news-head">
        <h3 class="news-title">${escapeHtml(item.title || "")}</h3>
        <div class="news-time">AVISOS · ${formatTime(item.created_at)}</div>
      </div>
      <p class="news-body">${escapeHtml(item.body || "")}</p>
    </article>
  `).join("");
}

updateClock();
setInterval(updateClock, 1000);
loadAvisos();
</script>

</body>
</html>
