<style>
  :root{--bg:#000;--fg:#e8e8e8;--c:#0ff;--y:#ff0;--m:#f0f;--g:#0f0;--r:#f33;--b:#39f;}
  .ttx{max-width:900px;margin:0 auto;padding:18px 14px 28px;
       font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;letter-spacing:.02em;}
  .bar{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border:2px solid var(--b);
       color:var(--c);text-transform:uppercase;font-weight:700;}
  .bar b{color:var(--y);}
  .screen{margin-top:14px;border:2px solid #444;padding:10px 10px 14px;min-height:60vh;
          box-shadow:0 0 0 2px #111 inset;background:var(--bg);color:var(--fg);}
  .line{white-space:pre-wrap;line-height:1.25;}
  .c{color:var(--c);} .y{color:var(--y);} .m{color:var(--m);} .g{color:var(--g);} .r{color:var(--r);} .b{color:var(--b);}
  .foot{margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;color:#bbb;font-size:14px;}
  .pill{border:1px solid #444;padding:4px 8px;}
  a{color:var(--c);text-decoration:none;} a:hover{text-decoration:underline;}
  .muted{color:#aaa}

  /* Zebra rows (teletexto vibe) */
  .item{padding:6px 6px;border-left:3px solid transparent;}
  .item.odd{background:#050505;border-left-color:#111;}
  .item.even{background:#020202;border-left-color:#222;}
  .item .t{font-weight:700;color:var(--y);}
  .item .s{color:#b9b9b9;}
  .item .open{margin-top:2px}
  .sep{height:10px}

  /* Nav links horizontal + pill-ish */
  .navrow{margin-top:10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .navrow .label{color:var(--r);font-weight:700}
  .navrow a{
    display:inline-block;
    border:1px solid #333;
    padding:4px 8px;
    border-radius:999px;
    color:var(--c);
  }
  .navrow a:hover{border-color:var(--c)}
</style>

<div class="ttx">
  <div class="bar">
    <div>TELETEXTO <b>RSS</b> // PÁG <span class="y" id="pnum">101</span></div>
    <div><span class="g" id="dow">---</span> <span class="muted" id="date">--/--/----</span>  <span class="c" id="clock">--:--</span></div>
  </div>

  <div class="screen" id="screen">
    <div class="line c">Cargando feeds…</div>
  </div>

  <div class="foot">
    <div class="pill"><span class="y">Teclea</span> 101 / 120 / 140 / 160 / 180 / 200</div>
    <div class="pill"><span class="y">Enter</span> ir · <span class="y">Esc</span> arriba</div>
    <div class="pill"><a href="{{ '/metal-teletexto.html' | relative_url }}">Metal</a></div>
    <div class="pill"><a href="{{ '/' | relative_url }}">Volver</a></div>
  </div>
</div>

<script>
  const screen = document.getElementById('screen');
  const pnum = document.getElementById('pnum');
  const dowEl = document.getElementById('dow');
  const dateEl = document.getElementById('date');
  const clockEl = document.getElementById('clock');

  function tickClock(){
    const d = new Date();
    const dows = ["DOM","LUN","MAR","MIÉ","JUE","VIE","SÁB"];
    dowEl.textContent = dows[d.getDay()];
    clockEl.textContent = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    dateEl.textContent = String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
  }
  tickClock(); setInterval(tickClock, 15000);

  function stripHtml(s){
    return String(s || "")
      .replace(/<style[\s\S]*?<\/style>/gi, "")
      .replace(/<script[\s\S]*?<\/script>/gi, "")
      .replace(/<[^>]+>/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function wrap(text, width){
    const words = (text || "").split(/\s+/).filter(Boolean);
    const lines = [];
    let line = "";
    for(const w of words){
      if(!line.length) line = w;
      else if((line + " " + w).length <= width) line += " " + w;
      else { lines.push(line); line = w; }
    }
    if(line) lines.push(line);
    return lines;
  }

  function escapeHtml(s){
    return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
  }
  function escapeAttr(s){
    return String(s).replaceAll('"','&quot;');
  }

  // ===== Page 200: abreviaturas -> nombres completos (front-only) =====
  // Ajusta/añade aquí lo que necesites.
  const TEAM_MAP = {
    // España / LaLiga (ejemplos típicos que te salen)
    "REA":"Real Madrid",
    "BAR":"FC Barcelona",
    "ATL":"Atlético de Madrid",
    "SEV":"Sevilla FC",
    "VAL":"Valencia CF",
    "ATH":"Athletic Club",
    "VIL":"Villarreal CF",
    "OSA":"CA Osasuna",
    "ESP":"RCD Espanyol",
    "CEL":"RC Celta",
    "GIR":"Girona FC",
    "RAY":"Rayo Vallecano",
    "ALA":"Deportivo Alavés",
    "LEV":"Levante UD",
    "ELC":"Elche CF",
    "MAL":"Málaga CF"
  };

  function expandTeamsInLine(title){
    // Detecta líneas tipo: "GIR  1-2  CEL" o "REA  2-2  SEV"
    const s = String(title || "").trim();
    const m = s.match(/^([A-ZÁÉÍÓÚÜÑ]{3})\s+(\d+|-)\s*-\s*(\d+|-)\s+([A-ZÁÉÍÓÚÜÑ]{3})$/);
    if(!m) return s;

    const h = m[1], hs = m[2], as = m[3], a = m[4];
    const home = TEAM_MAP[h] || h;
    const away = TEAM_MAP[a] || a;
    return `${home} ${hs}-${as} ${away}`;
  }

  function navHtml(){
    // botones horizontales + clicables
    return `
      <div class="navrow">
        <span class="label">Ir a:</span>
        <a href="#" data-page="101">101</a>
        <a href="#" data-page="120">120</a>
        <a href="#" data-page="140">140</a>
        <a href="#" data-page="160">160</a>
        <a href="#" data-page="180">180</a>
        <a href="#" data-page="200">200</a>
      </div>
    `;
  }

  function wireNav(data){
    screen.querySelectorAll('[data-page]').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        const page = Number(a.getAttribute('data-page'));
        renderPage(page, data);
      });
    });
  }

  function renderPage(page, data){
    pnum.textContent = page;

    const block = data.pages?.[String(page)];
    if(!block){
      screen.innerHTML = `
        <div class="line r">Página ${page} no disponible</div>
        <div class="line muted">Teclea 101 / 120 / 140 / 160 / 180 / 200</div>
        ${navHtml()}
      `;
      wireNav(data);
      return;
    }

    const header = block.header || `PÁG ${page}`;
    const items = block.items || [];
    const max = block.maxItems || 10;

    const out = [];
    out.push(`<div class="line c">${escapeHtml(header)}</div>`);
    out.push(`<div class="line">----------------------------------------</div>`);

    items.slice(0, max).forEach((it, idx) => {
      const oddEven = (idx % 2 === 0) ? "odd" : "even";

      let title = stripHtml(it.title);
      // Solo para la 200: expande equipos si encaja
      if (String(page) === "200") title = expandTeamsInLine(title);

      const desc  = stripHtml(it.summary || it.description || "");
      const link = it.link || "";

      out.push(`<div class="item ${oddEven}">`);
      out.push(`<div class="t">${escapeHtml(title)}</div>`);

      // En resultados de fútbol suele ser FINISHED/LIVE, lo ponemos compacto
      const isTiny = String(page) === "200" && (desc === "FINISHED" || desc === "LIVE" || desc === "IN_PLAY");
      if(desc){
        const lines = wrap(desc, 66).slice(0, isTiny ? 1 : 3);
        lines.forEach(l => out.push(`<div class="s">${escapeHtml(l)}</div>`));
      }

      // ✅ Enlace al final de cada “noticia”
      if(link){
        out.push(`<div class="open"><a href="${escapeAttr(link)}" target="_blank" rel="noopener">[abrir]</a></div>`);
      }

      out.push(`</div>`);
      out.push(`<div class="sep"></div>`);
    });

    out.push(navHtml());

    screen.innerHTML = out.join("");
    wireNav(data);
    scrollTo({top:0, behavior:"smooth"});
  }

  let DATA = null;
  let buf = "";

  addEventListener('keydown', (e) => {
    if(e.key === 'Escape') return scrollTo({top:0, behavior:'smooth'});
    if(/^\d$/.test(e.key)){ buf = (buf + e.key).slice(-3); return; }
    if(e.key === 'Enter'){
      const page = Number(buf || 101);
      buf = "";
      if(DATA) renderPage(page, DATA);
    }
  });

  const TELE_JSON = "{{ '/assets/teletexto.json' | relative_url }}";
  fetch(`${TELE_JSON}?ts=${Date.now()}`)
    .then(r => r.json())
    .then(j => { DATA = j; renderPage(101, DATA); })
    .catch(() => {
      screen.innerHTML = `<div class="line r">No se pudo cargar ${TELE_JSON}</div>
                          <div class="line muted">¿Existe assets/teletexto.json?</div>`;
    });
</script>
