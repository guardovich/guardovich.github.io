name: Update Teletexto RSS

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # cada 6 horas

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm init -y && npm i rss-parser

      - - name: Generate teletexto JSON
  env:
    FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
  run: node scripts/teletexto-rss-to-json.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/teletexto.json
          git diff --cached --quiet || git commit -m "Update teletexto feeds"
          git push
