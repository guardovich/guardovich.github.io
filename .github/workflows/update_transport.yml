name: Actualizar transporte Santander

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update-transport:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar requests
        run: pip install requests

      - name: Ejecutar script
        run: python teletextosantander/scripts/update_transport.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add teletextosantander/data/transport.json
          git diff --staged --quiet || git commit -m "Actualizar transporte Santander"
          git push
