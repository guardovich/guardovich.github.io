<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title }} · {{ site.title }}</title>

  <!-- Fuente “terminal” -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <!-- Tu CSS -->
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>

<body>
  <div class="wrap">
    <aside class="sidebar">

      <div class="avatar-frame">
        <img class="avatar" src="https://github.com/guardovich.png" alt="David Guardo" />
      </div>

      <div class="sb-name">DAVID GUARDO</div>

      <div class="sb-role">
        <div>Tu cargo 1</div>
        <div>Tu cargo 2</div>
        <div>Tema / enfoque</div>
        <div class="muted">Santander / España</div>
      </div>

      <div class="divider"></div>

      <nav class="menu">
        <a class="menu-item" href="{{ '/' | relative_url }}">⌂ Inicio</a>
        <a class="menu-item" href="{{ '/investigacion.html' | relative_url }}">◈ Investigación</a>
        <a class="menu-item" href="{{ '/docencia.html' | relative_url }}">◇ Docencia</a>
      </nav>

      <div class="divider"></div>

      <div class="chips">
        <a class="chip" href="#" target="_blank" rel="noopener">Scholar</a>
        <a class="chip" href="#" target="_blank" rel="noopener">ORCID</a>
        <a class="chip" href="https://github.com/guardovich" target="_blank" rel="noopener">GitHub</a>
        <a class="chip" href="mailto:TUEMAIL@DOMINIO.COM">Email</a>
      </div>

    </aside>

    <main class="content">
      <div class="topline">
        <span class="prompt">&gt;</span>
        <span class="title">{{ site.title | upcase }}</span>
      </div>

      <div class="subhead">
        <div>Una línea de subtítulo</div>
        <div class="muted">Otra línea (grupo, departamento, etc.)</div>
      </div>

      <section class="panel">
        {{ content }}
      </section>
    </main>
  </div>
</body>
</html>
