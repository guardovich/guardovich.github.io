<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title }} · {{ site.title }}</title>

  <!-- Fuente terminal -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <!-- CSS con cache busting -->
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}?v={{ site.github.build_revision }}">
</head>

<body>
  <div class="wrap">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">

      <div class="avatar-frame">
        <img class="avatar" src="https://github.com/guardovich.png" alt="David Guardo" />
      </div>

      <div class="sb-name">DAVID GUARDO</div>

      <div class="sb-role">
        <div>Docente-Investigador</div>
        <div>www.davidguardo.com</div>
        <div>Comunicación y Empresa</div>
        <div class="muted">Santander / España</div>
      </div>

      <div class="divider"></div>

      <!-- Navegación dinámica -->
      <nav class="menu">
        <a class="menu-item {% if page.url == '/' %}active{% endif %}"
           href="{{ '/' | relative_url }}">⌂ Inicio</a>

        <a class="menu-item {% if page.url contains 'investigacion' %}active{% endif %}"
           href="{{ '/investigacion.html' | relative_url }}">◈ Investigación</a>

        <a class="menu-item {% if page.url contains 'docencia' %}active{% endif %}"
           href="{{ '/docencia.html' | relative_url }}">◇ Docencia</a>
      </nav>

      <div class="divider"></div>

      <div class="chips">
        <a class="chip" href="#" target="_blank" rel="noopener">Scholar</a>
        <a class="chip" href="#" target="_blank" rel="noopener">ORCID</a>
        <a class="chip" href="https://github.com/guardovich" target="_blank" rel="noopener">GitHub</a>
        <a class="chip" href="mailto:TUEMAIL@DOMINIO.COM">Email</a>
      </div>

    </aside>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <main class="content">

      <div class="topline">
        <span class="prompt">&gt;</span>
        <span class="title">{{ site.title | upcase }}</span>
      </div>

      <div class="subhead">
        <div>Una línea de subtítulo</div>
        <div class="muted">Otra línea (grupo, departamento, etc.)</div>
      </div>

      <section class="panel">
        {{ content }}
      </section>

    </main>

  </div>
</body>
</html>
