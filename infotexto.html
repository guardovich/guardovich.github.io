layout: default

permalink: /infotexto.html
---

<section class="ttx infotexto" id="infotexto">
  <div class="hdr">
    <div class="logo">INFOTEXTO</div>
    <div class="tag">calidad informativa · medio de comunicación</div>
  </div>

  <div class="bar">
    <div class="bar-left">
      <label class="lbl">País</label>
      <select id="country" class="sel">
        <option value="ES" selected>ES · España</option>
      </select>

      <label class="lbl">Buscar medio</label>
      <input id="q" class="inp" placeholder="Ej: El País / elmundo / lavanguardia" />

      <button id="btnBuscar" class="btn btn-lg">Buscar</button>
      <button id="btnRandom" class="btn">Aleatorio</button>
    </div>

    <div class="bar-right">
      <div class="nutri" id="nutriBox">
        <div class="nutri-grade" id="nutriGrade">—</div>
        <div class="nutri-meta">
          <div class="nutri-title">Indicador global</div>
          <div class="nutri-sub" id="nutriAvg">—/100</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="left">
      <div class="panel">
        <div class="panel-title">
          <span class="c">LISTA DE MEDIOS</span>
        </div>
        <div id="list" class="list"></div>
      </div>

      <div class="panel">
        <div class="panel-title">
          <span class="y">DETALLE</span>
        </div>

        <div id="detail" class="detail">
          <div class="row">
            <div class="k">Medio</div>
            <div class="v" id="d_nombre">—</div>
          </div>
          <div class="row">
            <div class="k">Tipo</div>
            <div class="v" id="d_tipo">—</div>
          </div>
          <div class="row">
            <div class="k">Propietario</div>
            <div class="v" id="d_propietario">—</div>
          </div>
          <div class="row">
            <div class="k">URL</div>
            <div class="v"><a id="d_url" href="#" target="_blank">—</a></div>
          </div>

          <div class="vars" id="sliders"></div>
        </div>
      </div>
    </div>

    <div class="right">
      <div class="panel">
        <div class="panel-title">
          <span class="m">RADAR 5 PUNTAS</span>
        </div>

        <div class="radar-wrap">
          <svg id="radar" width="360" height="360" viewBox="0 0 360 360">
            <rect width="360" height="360" fill="transparent"></rect>
            <g id="grid"></g>
            <polygon id="valuePoly"
              fill="rgba(0,255,255,0.18)"
              stroke="rgba(0,255,255,0.9)"
              stroke-width="2"></polygon>
            <g id="dots"></g>
            <g id="labels"></g>
          </svg>
        </div>

        <div class="metrics" id="metricsText">—</div>
      </div>
    </div>
  </div>
</section>

<style>
:root{
  --bg:#000; --fg:#e8e8e8;
  --c:#0ff; --y:#ff0; --m:#f0f;
  --dim:#9aa;
}
.infotexto{
  max-width:1100px;
  margin:14px auto;
  padding:14px;
  background:var(--bg);
  color:var(--fg);
  border:2px solid #222;
  font-family:monospace;
}
.hdr{display:flex;justify-content:space-between;border-bottom:1px solid #222;padding-bottom:10px;margin-bottom:12px;}
.logo{color:var(--c);font-weight:900;font-size:22px;}
.tag{color:var(--dim);font-size:12px;}

.bar{display:flex;justify-content:space-between;flex-wrap:wrap;border-bottom:1px solid #222;padding-bottom:12px;margin-bottom:12px;}
.bar-left{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.lbl{color:var(--y);font-size:12px;}
.sel,.inp{background:#050505;color:var(--fg);border:1px solid #333;padding:10px;}
.btn{background:#0b0b0b;color:var(--fg);border:1px solid #333;padding:10px;cursor:pointer;text-transform:uppercase;}
.btn:hover{border-color:var(--c);color:var(--c);}
.btn-lg{font-weight:900;}

.nutri{border:1px solid #333;padding:10px;display:flex;gap:10px;align-items:center;}
.nutri-grade{width:44px;height:44px;display:grid;place-items:center;font-weight:900;font-size:22px;border:1px solid #333;}
.nutri-sub{color:var(--dim);font-size:12px;}

.main{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:900px){.main{grid-template-columns:1fr;}}

.panel{border:1px solid #222;padding:12px;background:#020202;}
.panel-title{font-weight:900;margin-bottom:10px;}
.list{max-height:280px;overflow:auto;border:1px solid #222;}
.item{padding:10px;border-bottom:1px dotted #222;cursor:pointer;}
.item:hover{background:#060606;}
.row{display:grid;grid-template-columns:120px 1fr;gap:10px;padding:6px 0;border-bottom:1px dotted #222;}
.k{color:var(--y);}
.vars{margin-top:10px;border:1px solid #222;padding:10px;}
.sl-row{display:grid;grid-template-columns:180px 1fr 50px;gap:10px;padding:6px 0;}
.sl-name{color:var(--c);font-weight:800;}
.sl-val{color:var(--y);text-align:right;}
.radar-wrap{display:flex;justify-content:center;border:1px solid #333;padding:10px;background:#010101;}
.metrics{margin-top:10px;border:1px solid #222;padding:10px;}
</style>

<!-- 🔥 IMPORTANTE: cargar base de datos antes del script principal -->
<script src="./data/medios.index.js"></script>
<script src="./data/medios.es.js"></script>

<script>
(() => {

const VARS = [
  { key:"independencia", name:"Independencia" },
  { key:"reputacion", name:"Reputación" },
  { key:"transparencia", name:"Transparencia" },
  { key:"rigor", name:"Rigor" },
  { key:"sesgo", name:"Equilibrio político" }
];

const $ = id => document.getElementById(id);
const listEl = $("list");
const qEl = $("q");
const countryEl = $("country");

function getDB(){
  const c = countryEl.value || "ES";
  return (window.MEDIA_DB && window.MEDIA_DB[c]) ? window.MEDIA_DB[c] : [];
}

function renderList(items){
  listEl.innerHTML="";
  items.forEach(m=>{
    const div=document.createElement("div");
    div.className="item";
    div.textContent=m.nombre;
    div.onclick=()=>renderDetail(m);
    listEl.appendChild(div);
  });
}

function renderDetail(m){
  $("d_nombre").textContent=m.nombre;
  $("d_tipo").textContent=m.tipo;
  $("d_propietario").textContent=m.propietario;
  $("d_url").textContent=m.url;
  $("d_url").href=m.url;
  buildSliders(m);
  renderRadar(m.variables);
}

function buildSliders(m){
  const el=$("sliders");
  el.innerHTML="";
  VARS.forEach(v=>{
    const row=document.createElement("div");
    row.className="sl-row";
    row.innerHTML=`
      <div class="sl-name">${v.name}</div>
      <input type="range" min="0" max="100" value="${m.variables[v.key]}">
      <div class="sl-val">${m.variables[v.key]}</div>
    `;
    const input=row.querySelector("input");
    const out=row.querySelector(".sl-val");
    input.oninput=e=>{
      m.variables[v.key]=Number(e.target.value);
      out.textContent=e.target.value;
      renderRadar(m.variables);
    };
    el.appendChild(row);
  });
}

function renderRadar(vars){
  const avg=Math.round(Object.values(vars).reduce((a,b)=>a+b,0)/5);
  $("nutriAvg").textContent=avg+"/100";
  $("nutriGrade").textContent=
    avg>=80?"A":avg>=65?"B":avg>=50?"C":avg>=35?"D":"E";
}

$("btnBuscar").onclick=()=>{
  const q=qEl.value.toLowerCase();
  const items=getDB().filter(m=>m.nombre.toLowerCase().includes(q));
  renderList(items);
};

$("btnRandom").onclick=()=>{
  const db=getDB();
  const m=db[Math.floor(Math.random()*db.length)];
  renderDetail(m);
};

renderList(getDB());
})();
</script>
